version: "3.8"

services:
  quickthumb-lab:
    build: .
    container_name: command-injection-imageprocessor-lab
    ports:
      - "5000:5000"
    environment:
      - SECRET_API_KEY=QUICKTHUMB_SECRET_KEY_2026
      - FLASK_ENV=development
      - FLASK_DEBUG=1
    networks:
      - lab-network
    restart: unless-stopped
    # Ensure container has internet access for tools to work
    dns:
      - 8.8.8.8
      - 1.1.1.1
    # Add healthcheck configuration
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # Optional: Mount volumes for persistent uploads (for educational purposes)
    # volumes:
    #   - ./uploads:/app/uploads
    #   - ./static:/app/static

networks:
  lab-network:
    driver: bridge
