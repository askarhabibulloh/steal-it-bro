<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Data Penggunaan Ruangan</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
  </head>
  <body>
    <div class="page-shell">
      <section class="controls neo-card">
        <div class="mode-switch" role="radiogroup" aria-label="Mode filter">
          <label class="mode-option">
            <input
              type="radio"
              name="filterMode"
              id="modeDate"
              value="date"
              checked
            />
            <span>Filter tanggal</span>
          </label>
          <label class="mode-option">
            <input type="radio" name="filterMode" id="modeRoom" value="room" />
            <span>Filter ruang</span>
          </label>
          <label class="mode-option">
            <input
              type="radio"
              name="filterMode"
              id="modeAdvanced"
              value="advanced"
            />
            <span>Advanced</span>
          </label>
        </div>

        <div class="filter-panels">
          <section class="filter-panel" id="datePanel">
            <div class="filter-panel__header">
              <p class="filter-panel__hint">
                Gunakan date picker atau tombol prev/next untuk berpindah hari.
              </p>
            </div>
            <div class="date-navigation">
              <button id="prevDate" class="date-nav-button" type="button">
                ◀
              </button>
              <span id="dayName" class="day-name">Hari</span>
              <input type="date" id="dateFilter" class="date-input" />
              <button id="nextDate" class="date-nav-button" type="button">
                ▶
              </button>
            </div>
          </section>

          <section class="filter-panel" id="roomPanel" hidden>
            <div class="filter-panel__header">
              <p class="filter-panel__hint">
                Pilih ruang yang ingin ditampilkan.
              </p>
            </div>
            <div id="roomCheckboxList" class="checkbox-grid"></div>
          </section>

          <section class="filter-panel" id="advancedPanel" hidden>
            <div class="filter-panel__header">
              <p class="filter-panel__hint">
                Pilih rentang tanggal dan ruang, lalu tekan tombol tampilkan
                data.
              </p>
            </div>
            <div class="date-range-grid">
              <label class="field-group">
                <span>Mulai</span>
                <input type="date" id="dateFrom" class="date-input" />
              </label>
              <label class="field-group">
                <span>Selesai</span>
                <input type="date" id="dateTo" class="date-input" />
              </label>
            </div>
            <div
              id="advancedRoomCheckboxList"
              class="checkbox-grid checkbox-grid--compact"
            ></div>
            <div class="filter-actions">
              <button
                id="applyAdvancedFilters"
                class="apply-button"
                type="button"
              >
                Tampilkan Data
              </button>
            </div>
          </section>
        </div>
      </section>

      <section class="table-shell neo-card">
        <div class="table-shell__header">
          <div>
            <h2>Data Penggunaan</h2>
          </div>
        </div>
        <div id="table-container" class="room-list"></div>
      </section>
    </div>

    <script src="papaparse.min.js" defer></script>
    <script src="parserasdf.js" defer></script>
    <script src="date-utilsasdf.js" defer></script>
    <script src="scriptasdf.js" defer></script>
    <script src="slot_data.js" defer></script>
  </body>
</html>
